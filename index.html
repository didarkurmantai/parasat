<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Саған ❤️</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="falling-elements" id="falling-container"></div>

  <div class="wrapper">
    <div class="container">
      <h1 class="title">Саған ❤️</h1>

      <div class="divider">🌻</div>

      <p class="main-text">
        Осы жыл мен үшін күнбағыссыз, <br>
        Күнбағыс - сіз
      </p>

      <div class="images">
        <div class="img-frame"><img src="cute.jpg" alt="cute"></div>
        <div class="img-frame main-frame"><img src="sunflower.avif" alt="sunflower"></div>
        <div class="img-frame"><img src="girl2.jpg" alt="girl"></div>
      </div>

      <button id="musicBtn" onclick="playMusic()">Музыканы қосу 🎵</button>

      <audio id="audio1" src="Bal.mp3"></audio>
      <audio id="audio2" src="orda.mp3"></audio>
      <div class="wishes">
  <h2>Кішкентай тілектер ✨</h2>

  <div class="wish" onclick="toggleWish(this)">
    <div class="date">15 сәуір</div>
    <div class="text">Саған әрқашан қуаныш тілеймін 💛</div>
  </div>

  <div class="wish" onclick="toggleWish(this)">
    <div class="date">16 сәуір</div>
    <div class="text">Күнің әрдайым жарық болсын 🌻</div>
  </div>

  <div class="wish" onclick="toggleWish(this)">
    <div class="date">17 сәуір</div>
    <div class="text">Армандарың орындалсын ✨</div>
  </div>

</div>
    </div>
  </div>

  <script>
    function playMusic() {
      const a1 = document.getElementById("audio1");
      const a2 = document.getElementById("audio2");
      const btn = document.getElementById("musicBtn");
      const songs = [a1, a2];

      songs.forEach(song => {
        song.pause();
        song.currentTime = 0;
      });

      const randomSong = songs[Math.floor(Math.random() * songs.length)];
      randomSong.play().catch(e => console.log("Музыканы ойнатуға рұқсат керек"));
      
      btn.innerText = "Келесі ән 🎶";
    }

    // --- Анимация падающих элементов (Подсолнухи + Сердечки) ---
    function createFallingElement() {
      const container = document.getElementById('falling-container');
      const element = document.createElement('div');
      
      // Выбираем случайно: подсолнух или сердечко
      const types = ['🌻', '❤️', '💖', '✨'];
      element.innerText = types[Math.floor(Math.random() * types.length)];
      
      element.className = 'falling-item';
      
      // Рандомная позиция по горизонтали
      element.style.left = Math.random() * 100 + "vw";
      
      // Рандомная скорость (дольше = плавнее)
      const duration = Math.random() * 5 + 5; // от 5 до 10 секунд
      element.style.animationDuration = duration + "s";
      
      // Рандомный размер
      const size = Math.random() * 10 + 15; // от 15 до 25px
      element.style.fontSize = size + "px";
      
      // Рандомная задержка (чтобы не все сразу)
      element.style.animationDelay = Math.random() * 5 + "s";

      container.appendChild(element);

      // Удаляем элемент после завершения анимации
      setTimeout(() => {
        element.remove();
      }, (duration + 5) * 1000);
    }

    // Создаем элементы постоянно
    setInterval(createFallingElement, 400); // каждые 0.4 секунды
    function toggleWish(element) {
  const text = element.querySelector(".text");

  if (text.style.display === "block") {
    text.style.display = "none";
  } else {
    text.style.display = "block";
  }
}
  </script>
</body>
</html>
